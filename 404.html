<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Trip Dashboard</title>
    <script>
      // GitHub Pages SPA redirect — encodes the path into a query param
      // so index.html can restore it with history.replaceState before React boots.
      // segmentCount = 1 because the app lives at /trip-dashboard/ (one subdirectory).
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
